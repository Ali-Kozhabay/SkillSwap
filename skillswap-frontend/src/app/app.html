<div class="shell">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-main">
        <a class="brand" routerLink="/services">
          <span class="brand-mark">S</span>
          <span class="brand-copy">
            <strong>SkillSwap</strong>
            <small>Talent marketplace</small>
          </span>
        </a>

        <nav class="nav-links">
          <a routerLink="/services" routerLinkActive="is-active">Find talent</a>
          @if (auth.isAuthenticated()) {
            <a routerLink="/dashboard" routerLinkActive="is-active">Dashboard</a>
          }
        </nav>
      </div>

      <div class="topbar-actions">
        @if (auth.currentUser(); as user) {
          <span class="user-pill">{{ user.display_name }}</span>
          <button
            class="ghost-button topbar-logout-button"
            type="button"
            (click)="logout()"
            [disabled]="auth.isLoggingOut()"
          >
            {{ auth.isLoggingOut() ? 'Logging out...' : 'Log out' }}
          </button>
        } @else if (auth.isRestoring()) {
          <span class="user-pill">Loading account...</span>
        } @else {
          <a class="ghost-link" routerLink="/login" routerLinkActive="is-active">Log in</a>
          <a class="primary-button" routerLink="/login">Sign up</a>
        }
      </div>
    </div>
  </header>

  <main class="page-shell">
    <router-outlet />
  </main>
</div>
